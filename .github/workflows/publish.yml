name: Build and publish artifacts

on:
  release:
    types: [created]

jobs:
  releases-matrix:
    name: Build and publish static binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goarch: "arm64"
            goos: windows

    steps:
      - name: Get Release Info
        run: |
          {
            RELEASE_TAG=${GITHUB_REF/refs\/tags\//}
            echo RELEASE_TAG=${RELEASE_TAG:1}
            echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#*/}"
          } >> "$GITHUB_ENV"
      - uses: actions/checkout@v2
      - uses: wangyoucao577/go-release-action@v1.38
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          project_path: "./"
          binary_name: ${{env.REPOSITORY_NAME}}
          pre_command: "export CGO_ENABLED=0"
          extra_files: LICENSE README.md
          overwrite: true
          asset_name: ${{env.REPOSITORY_NAME}}-${{ env.RELEASE_TAG }}-${{matrix.goos}}-${{matrix.goarch}}
